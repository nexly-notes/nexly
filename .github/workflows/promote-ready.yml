name: Promote unblocked items to Ready

# When an issue closes, promote Backlog items whose blockers are now all done.
# Each run is a global reconcile: pull --statuses derives Done from every
# closed issue's state, resolve promotes all unblocked Backlog stories, and
# push-status diff-skips no-ops — idempotent and order-independent. The board
# is the only thing written; backlog.json is never committed back.
on:
  issues:
    types: [closed]

permissions:
  contents: read

concurrency:
  group: project-board-sync
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull board state, resolve, push statuses
        working-directory: .github
        env:
          # Classic PAT (repo + project scopes) — the default GITHUB_TOKEN
          # cannot write user-owned Projects v2.
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          python3 -m project_manager.cli pull --statuses
          python3 -m project_manager.cli resolve
          python3 -m project_manager.cli push-status
