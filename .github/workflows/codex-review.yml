name: Codex code review

# AI code review on pull requests using the official OpenAI Codex GitHub Action
# (openai/codex-action@v1). The action installs the Codex CLI and starts the
# Responses API proxy from OPENAI_API_KEY — the supported way to authenticate
# `codex exec` in CI. (A bare `codex exec` with only the env var set reaches the
# Responses endpoint with no bearer and fails with 401 "missing bearer".)
#
# Security model: Codex runs in a READ-ONLY sandbox — no file writes, and no
# direct network (model calls go through the action's local proxy). A separate,
# trusted step posts the review as a sticky PR comment with the built-in
# GITHUB_TOKEN; the model output and the write credential never share a step, so
# a prompt-injection in a diff can't escalate into repo/PR writes. (It could at
# most influence the review text/verdict — an inherent limit of any AI gate.)
#
# Merge gate: the `codex-review` job is meant to be a REQUIRED status check. A
# trusted final step reads the model's `VERDICT:` line from the output file and
# fails the job on `VERDICT: FAIL` (or when no verdict is found — fail closed),
# which blocks the merge. The gate is purely the job's exit code.
#
# Setup:
#   1. Add a valid OPENAI_API_KEY repository secret with access to the model.
#   2. Fork PRs are skipped on purpose — Actions secrets aren't exposed to forks.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Job id is the status-check context branch protection matches on.
  codex-review:
    # Skip drafts and fork PRs (forks can't read OPENAI_API_KEY).
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can diff against the base branch

      - name: Compute PR diff
        env:
          BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags origin "$BASE"
          git diff "origin/${BASE}...HEAD" > pr.diff
          echo "Changed files:"
          git diff --name-only "origin/${BASE}...HEAD"

      - name: Run Codex review
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt-file: .github/codex/prompts/review.md
          output-file: codex-review.md

      - name: Post review as a sticky PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          marker='<!-- codex-review -->'
          body="${marker}"$'\n'"$(cat codex-review.md)"
          # Reuse our previous comment if one exists, so re-runs update in place
          # instead of spamming a new comment on every push.
          id=$(gh api "repos/${REPO}/issues/${PR}/comments" \
                 --jq "[.[] | select(.body | startswith(\"${marker}\"))][0].id // empty")
          if [ -n "$id" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${id}" -f body="$body"
          else
            gh pr comment "$PR" --body "$body"
          fi

      # Merge gate. Trusted: reads only the model's output file (no token needed)
      # and maps the verdict to an exit code. Runs after the comment so the verdict
      # is always visible on the PR, even when this fails the check. Fails closed:
      # a missing/garbled verdict blocks the merge rather than waving it through.
      - name: Enforce review verdict (merge gate)
        run: |
          if grep -qE '^VERDICT: PASS[[:space:]]*$' codex-review.md; then
            echo "Codex review passed — no P0/P1 findings."
            exit 0
          fi
          if grep -qE '^VERDICT: FAIL[[:space:]]*$' codex-review.md; then
            echo "::error::Codex review found P0/P1 findings — blocking merge. See the PR review comment."
            exit 1
          fi
          echo "::error::No machine-readable VERDICT line in the Codex output — failing closed."
          exit 1
