name: Move linked issues to In Review

# When a PR opens (or leaves draft), move its linked issues ("Closes #N")
# from In Progress to In Review on the project board. The status guard makes
# every trigger idempotent; push-status --only limits writes to the issues
# actually touched. Board-only — backlog.json is never committed back.
on:
  pull_request:
    types: [opened, ready_for_review, reopened]

permissions:
  contents: read

concurrency:
  group: project-board-sync
  cancel-in-progress: false

jobs:
  in-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find linked issues
        id: linked
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          nums=$(gh api graphql \
            -F owner='${{ github.repository_owner }}' \
            -F name='${{ github.event.repository.name }}' \
            -F number=${{ github.event.pull_request.number }} \
            -f query='query($owner:String!,$name:String!,$number:Int!){
              repository(owner:$owner,name:$name){
                pullRequest(number:$number){
                  closingIssuesReferences(first:20){nodes{number}}}}}' \
            --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' \
            | tr '\n' ' ')
          echo "numbers=${nums}" >> "$GITHUB_OUTPUT"
      - name: Move In Progress issues to In Review
        if: steps.linked.outputs.numbers != ''
        working-directory: .github
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          python3 -m project_manager.cli pull --statuses
          changed=""
          for n in ${{ steps.linked.outputs.numbers }}; do
            status=$(python3 -m project_manager.cli view "$n" --json 2>/dev/null | jq -r '.status // empty' || true)
            if [ "$status" = "In Progress" ]; then
              python3 -m project_manager.cli update "$n" --status "In Review"
              changed="$changed $n"
            else
              echo "Skipping #$n (status: ${status:-not on board})"
            fi
          done
          if [ -n "$changed" ]; then
            python3 -m project_manager.cli push-status --only $changed
          else
            echo "No linked In Progress issues; nothing to push."
          fi
